<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diseño de Menús con IA — Impuls Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #09090f;
      color: #f1f5f9;
      min-height: 100vh;
    }
    .demo-header {
      padding: 24px 32px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .back-link {
      align-self: flex-start;
      color: #94a3b8;
      font-size: 0.82rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #f1f5f9; }
    .demo-title {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #a78bfa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .demo-sub {
      font-size: 0.82rem;
      color: #64748b;
      text-align: center;
      max-width: 480px;
    }
    .tabs-wrap {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 24px 24px 0;
    }
    .tab-btn {
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { background: rgba(255,255,255,0.08); color: #f1f5f9; }
    .tab-btn.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(6,182,212,0.15));
      border-color: rgba(124,58,237,0.4);
      color: #c4b5fd;
    }
    .style-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .tab-label { display: flex; align-items: center; gap: 8px; }
    .frame-wrap { padding: 24px; display: flex; justify-content: center; }
    .menu-frame {
      width: 100%;
      max-width: 780px;
      height: 1100px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      display: none;
    }
    .menu-frame.active { display: block; }
    .cta-strip { text-align: center; padding: 32px 24px 48px; }
    .cta-strip p { font-size: 0.85rem; color: #64748b; margin-bottom: 16px; }
    .cta-strip a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 0 24px rgba(22,163,74,0.3);
      transition: all 0.2s;
    }
    .cta-strip a:hover { box-shadow: 0 0 40px rgba(22,163,74,0.5); transform: translateY(-1px); }
    @media (max-width: 600px) {
      .menu-frame { height: 900px; }
      .tabs-wrap { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
<div class="demo-header">
  <a href="index.html" class="back-link">← Volver a Impuls Digital</a>
  <div class="demo-title">Diseño de Menús con IA</div>
  <p class="demo-sub">Dos estilos de ejemplo. El diseño final se personaliza con tus platos, fotos reales y colores de tu negocio.</p>
</div>
<div class="tabs-wrap">
  <button class="tab-btn active" onclick="showTab('brasa', this)">
    <span class="tab-label"><span class="style-dot" style="background:#D4874E;"></span>La Brasa — Bistró oscuro</span>
  </button>
  <button class="tab-btn" onclick="showTab('rincon', this)">
    <span class="tab-label"><span class="style-dot" style="background:#FFD600;"></span>El Rincón — Editorial</span>
  </button>
</div>
<div class="frame-wrap">
  <iframe id="frame-brasa" class="menu-frame active" src="la-brasa-menu.html" title="La Brasa — menú bistró oscuro"></iframe>
  <iframe id="frame-rincon" class="menu-frame" src="el-rincon-menu.html" title="El Rincón — menú editorial"></iframe>
</div>
<div class="cta-strip">
  <p>¿Te gusta la dirección? El diseño final incluye tus fotos, precios reales y es 100% personalizable.</p>
  <a href="https://wa.me/34692388908?text=Vi%20los%20demos%20de%20men%C3%BA%20y%20me%20interesa%20hacer%20el%20de%20mi%20negocio" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a5.526 5.526 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.137.562 4.14 1.544 5.874L.057 23.428a.75.75 0 0 0 .916.916l5.554-1.487A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.694 9.694 0 0 1-4.93-1.347l-.353-.21-3.297.883.882-3.297-.21-.353A9.694 9.694 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
    Quiero el menú de mi negocio
  </a>
</div>
<script>
function showTab(id, btn) {
  document.querySelectorAll('.menu-frame').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('frame-' + id).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
